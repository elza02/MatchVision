<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leagues</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .league-logo {
            width: 40px;
            height: 40px;
            margin-right: 15px;
        }
        .list-group-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            transition: background-color 0.3s;
        }
        .list-group-item:hover {
            background-color: #f8f9fa;
        }
        .list-group-item a {
            text-decoration: none;
            color: inherit;
            width: 100%;
            display: flex;
            justify-content: space-between;
        }
        .league-info {
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}
<div class="container">
    <h1 class="text-center my-4">Available Leagues</h1>
    
    <!-- Display leagues in a list -->
    <div class="list-group">
        {% for league in leagues %}
        <div class="list-group-item">
            <!-- Make the league clickable to go to the fixtures page -->
            <a href="/league/{{ league['id'] }}">
                <div class="league-info">
                    <img src="{{ league['area']['flag'] }}" alt="{{ league['area']['name'] }} flag" class="league-logo">
                    <h5>{{ league['name'] }}</h5>
                </div>
                <p>{{ league['area']['name'] }}</p>
            </a>
        </div>
        {% else %}
        <p>No leagues available.</p>
        {% endfor %}
    </div>
</div>

<!-- Optional: Bootstrap JS and Popper.js for interactivity -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
</body>
</html>
