<style>
    /* Teams list */
.team-list {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-around;
    margin-top: 20px;
}

.team-card {
    text-align: center;
    margin: 10px;
    padding: 15px;
    border: 1px solid #ddd;
    border-radius: 8px;
    width: 200px;
    transition: transform 0.2s ease;
}

.team-card:hover {
    transform: scale(1.05);
}

.team-logo {
    width: 100px;
    height: 100px;
    margin-bottom: 10px;
}

/* Team details */
.team-details {
    text-align: center;
    margin: 20px;
}

.team-logo-large {
    width: 150px;
    height: 150px;
    margin-bottom: 20px;
}

.squad-list {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-around;
}

.player-card {
    text-align: left;
    margin: 10px;
    padding: 15px;
    border: 1px solid #ddd;
    border-radius: 8px;
    width: 220px;
    background-color: #f9f9f9;
}

</style>
<h2>Teams in the Premier League</h2>
<div class="team-list">
    {% for team in teams %}
    <div class="team-card">
        <a href="/team/{{ team['id'] }}">
            <img src="{{ team['crest'] }}" alt="{{ team['name'] }} logo" class="team-logo">
            <h3>{{ team['name'] }}</h3>
        </a>
    </div>
    {% endfor %}
</div>
